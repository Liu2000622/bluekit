name: build-windows-exe

# 在云端 Windows x64 runner 上自动打包 BlueKit.exe，无需本地 Windows 机器。
# 触发：手动运行(workflow_dispatch) 或 打 v* tag。
# 矩阵两条腿：
#   win10 —— Python 3.11 + 最新 PyInstaller + choco 最新版 Wireshark（Win 8.1/10/11）
#   win7  —— Python 3.8  + PyInstaller 5.13.2 + Wireshark 3.6.24（最后支持 Win7 的组合）
#           Python 3.9+ 的 python3xx.dll 依赖 Win8+ 的系统 API set，Win7 上加载必失败，
#           所以 Win7 用户必须用这条腿的产物。
# 前提：本 workflow 需位于【仓库根目录】的 .github/workflows/ 下。

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      bundle_tshark:
        description: "随包内嵌 portable tshark（Wireshark 引擎，自包含离线）"
        type: boolean
        default: true
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: win10
            python: "3.11"
            pyinstaller: "pyinstaller"
            wireshark: ""            # 空 = choco 最新版
            setupname: BlueKit-windows-x64-setup
            minver: "6.3"            # 安装程序拒绝在 Win8.1 以下运行, 防止 Win7 用户装错
          - flavor: win7
            python: "3.8"
            pyinstaller: "pyinstaller==5.13.2"
            wireshark: "3.6.24"      # 3.6.x 是最后支持 Win7 的 Wireshark 分支
            setupname: BlueKit-win7-x64-setup
            minver: "6.1sp1"         # Win7 SP1 起
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }} x64
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
          architecture: "x64"

      - name: Install deps + PyInstaller
        run: pip install "${{ matrix.pyinstaller }}" scapy pycryptodome openpyxl
        # WebShell 流量分析 Tab 需要 scapy/pycryptodome/openpyxl；其余 Tab 纯标准库

      - name: Fetch & embed tshark (Wireshark 引擎)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.bundle_tshark }}
        shell: pwsh
        run: pwsh build\fetch-tshark.ps1 -Version "${{ matrix.wireshark }}"
        # 把 tshark 填进 third_party\tshark\，随后 PyInstaller 按 spec 自动内嵌

      - name: Build exe (PyInstaller)
        run: pyinstaller build\bluekit.spec
        # spec 已把 third_party\tshark 整目录打入包内，无需打包后再拷贝

      - name: Smoke test (import 检查)
        shell: pwsh
        run: |
          python -c "import sys; sys.path.insert(0,'.'); from core import codec,deser,filetype,tshark,webshell,crypto_aes; assert crypto_aes.selftest(); print('core OK, AES selftest PASS')"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          if (!(Test-Path dist\BlueKit\BlueKit.exe)) { throw "dist\BlueKit\BlueKit.exe 未生成" }
          if ("${{ matrix.flavor }}" -eq "win7") {
          $note = @"
          BlueKit Win7 兼容版（Python 3.8 运行时）
          =========================================
          适用：Windows 7 SP1 及以上（Win 8.1/10/11 请优先用常规版 BlueKit-windows-x64-setup.exe）。

          Win7 需要的系统更新（缺少会报 api-ms-win-*.dll / 无法启动）：
          - Service Pack 1
          - KB2533623（安全 DLL 加载）
          - KB2999226（Universal C Runtime）
          "@
          ($note -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`r`n" |
            Out-File -Encoding utf8BOM dist\BlueKit\README-Win7.txt
          }
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -notmatch '^\d') { $ver = "0.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$ver `
            /DOutputName="${{ matrix.setupname }}" `
            /DMinVer="${{ matrix.minver }}" `
            "/O$((Get-Location).Path)" `
            build\bluekit.iss
          if (!(Test-Path "${{ matrix.setupname }}.exe")) { throw "安装程序未生成" }
          "安装程序: {0:N1} MB" -f ((Get-Item "${{ matrix.setupname }}.exe").Length/1MB)

      - name: Upload artifact (安装程序)
        uses: actions/upload-artifact@v4
        with:
          name: "BlueKit-${{ matrix.flavor }}-x64"
          path: "${{ matrix.setupname }}.exe"
          retention-days: 30

  release:
    # 仅 tag 触发：两条腿都打包成功后，把两个安装程序一起挂到 Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BlueKit-windows-x64-setup.exe
            BlueKit-win7-x64-setup.exe
          body: |
            | 下载 | 适用系统 |
            | --- | --- |
            | `BlueKit-windows-x64-setup.exe` | Windows 8.1 / 10 / 11（推荐） |
            | `BlueKit-win7-x64-setup.exe` | Windows 7 SP1（Python 3.8 兼容构建） |

            双击安装（默认装到用户目录，无需管理员权限），装完桌面快捷方式直接用；
            升级时直接安装新版即可，会自动替换旧版。装错系统版本时安装程序会拒绝并提示。
